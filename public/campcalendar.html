<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบวันว่าง - ค่ายลูกเสือ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FullCalendar CSS & JS -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    
    <!-- Google Font: Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f3f4f6;
        }
        /* ปรับแต่งสีปฏิทิน */
        .fc-day-today {
            background-color: #e6fffa !important;
        }
        .fc-event {
            cursor: pointer;
            border: none;
        }
        .fc-toolbar-title {
            font-size: 1.25rem !important;
            font-weight: 600;
            color: #1f2937;
        }
        .fc-button-primary {
            background-color: #059669 !important; /* Emerald 600 */
            border-color: #059669 !important;
        }
        .fc-button-primary:hover {
            background-color: #047857 !important;
            border-color: #047857 !important;
        }
        .fc-daygrid-day-number {
            color: #374151;
            text-decoration: none;
        }
        /* Loading Animation */
        .loader {
            border: 4px solid #f3f3f3;
            border-radius: 50%;
            border-top: 4px solid #059669;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-emerald-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="flex items-center justify-between max-w-lg mx-auto">
            <div>
                <h1 class="text-lg font-bold">🏕️ ค่ายพักแรมลูกเสือ</h1>
                <p class="text-xs text-emerald-100">ตรวจสอบตารางการจอง</p>
            </div>
            <button onclick="closeApp()" class="text-white text-sm bg-emerald-800 px-3 py-1 rounded hover:bg-emerald-900 transition">
                ปิด
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 max-w-lg mx-auto w-full relative">
        
        <!-- Status Legend -->
        <div class="flex justify-center space-x-4 mb-4 text-sm bg-white p-3 rounded-lg shadow-sm">
            <div class="flex items-center">
                <span class="w-3 h-3 rounded-full bg-emerald-100 border border-emerald-500 mr-2"></span>
                <span>ว่าง</span>
            </div>
            <div class="flex items-center">
                <span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span>
                <span>จองแล้ว</span>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="hidden absolute top-24 left-0 right-0 z-10 flex justify-center">
            <div class="bg-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
                <div class="loader"></div>
                <span class="text-sm text-gray-600">กำลังโหลดข้อมูล...</span>
            </div>
        </div>

        <!-- Calendar Container -->
        <div class="bg-white rounded-xl shadow-md p-3 overflow-hidden min-h-[400px]">
            <div id='calendar'></div>
        </div>

        <!-- Action Button -->
        <div class="mt-6 text-center">
            <p class="text-gray-600 text-sm mb-2">สนใจจองวันไหน ติดต่อแอดมินได้เลยครับ</p>
            <a href="https://line.me/ti/p/vLpgOF-XSu" target="_blank" class="block w-full bg-green-500 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-green-600 transition duration-300 transform active:scale-95">
                💬 ทักแชทจองเลย
            </a>
        </div>
    </main>

    <!-- Modal for Event Details -->
    <div id="eventModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-xs p-6 relative animate-fade-in-up">
            <h3 class="text-xl font-bold text-gray-800 mb-2" id="modalTitle">รายละเอียด</h3>
            <p class="text-gray-600 mb-4" id="modalDate">วันที่...</p>
            <div class="flex justify-end">
                <button onclick="closeModal()" class="bg-gray-200 text-gray-800 px-4 py-2 rounded hover:bg-gray-300">ปิด</button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        // URL ของ Google Apps Script ที่ Deploy แล้ว (อัปเดตตามที่คุณส่งมา)
        const API_URL = 'https://script.google.com/macros/s/AKfycbyIbDlOd6Eotw4TRkPlFJDOA_94slpxVo84SaHEYHHGQYwqtbRqJIJ0dzlUgH6EE-jz/exec';

        function closeApp() {
            // Logic สำหรับปิดหน้าต่างใน environment ต่างๆ
            try {
                if (window.liff) {
                    liff.closeWindow();
                } else {
                    window.close();
                }
            } catch (e) {
                console.log("Cannot close window via script");
                alert("กรุณากดปิดที่มุมขวาบนของแอปพลิเคชัน");
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var loadingEl = document.getElementById('loadingIndicator');

            // เริ่มต้นปฏิทิน
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th', // ภาษาไทย
                headerToolbar: {
                    left: 'prev',
                    center: 'title',
                    right: 'next'
                },
                height: 'auto',
                events: [], // เริ่มต้นด้วยข้อมูลว่าง
                
                // คลิกวันที่ว่าง
                dateClick: function(info) {
                    showModal("✅ วันนี้ว่าง", "วันที่ " + info.dateStr + " ยังไม่มีการจองครับ ท่านสามารถติดต่อแอดมินเพื่อจองได้เลย");
                },

                // คลิก Event (วันจองแล้ว)
                eventClick: function(info) {
                    // ป้องกัน default browser behavior
                    info.jsEvent.preventDefault(); 
                    showModal("⛔ " + info.event.title, "ขออภัย วันที่เลือกถูกจองแล้ว หรือไม่สามารถใช้งานได้");
                }
            });

            calendar.render();

            // --- Fetch Data from Google Apps Script ---
            fetchEvents();

            function fetchEvents() {
                // แสดง Loading
                loadingEl.classList.remove('hidden');
                loadingEl.classList.add('flex');

                fetch(API_URL)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok');
                        }
                        return response.json();
                    })
                    .then(data => {
                        console.log("Data received:", data);
                        
                        // ตรวจสอบว่า data เป็น array หรือไม่
                        if (Array.isArray(data)) {
                            // เพิ่ม Event ลงในปฏิทิน
                            data.forEach(event => {
                                calendar.addEvent({
                                    title: event.title || 'จองแล้ว',
                                    start: event.start,
                                    end: event.end, // ถ้ามี
                                    color: event.color || '#EF4444',
                                    allDay: true
                                });
                            });
                        } else {
                            console.error("Data format is not an array");
                            throw new Error("Invalid data format");
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching events:', error);
                        
                        // --- ERROR HANDLING & MOCK DATA ---
                        // เมื่อดึงข้อมูลจริงไม่ได้ (เช่น ติด CORS หรือยังไม่ได้ Deploy เป็น Anyone)
                        // ให้ใช้ข้อมูลจำลองแทน เพื่อให้ UI ไม่ว่างเปล่า
                        
                        showModal("⚠️ โหมดแสดงตัวอย่าง", "ไม่สามารถดึงข้อมูลจริงได้ (อาจเกิดจากสิทธิ์การเข้าถึง Script ไม่ใช่ 'Anyone') ระบบจะแสดงข้อมูลตัวอย่างแทนครับ");

                        const mockData = [
                            {
                                title: 'จองแล้ว (ตัวอย่าง)',
                                start: new Date().toISOString().slice(0, 10), // วันนี้
                                color: '#EF4444',
                                allDay: true
                            },
                            {
                                title: 'เต็ม (ตัวอย่าง)',
                                start: new Date(new Date().getTime() + 86400000 * 2).toISOString().slice(0, 10), // อีก 2 วัน
                                color: '#EF4444',
                                allDay: true
                            }
                        ];

                        mockData.forEach(event => {
                            calendar.addEvent(event);
                        });
                    })
                    .finally(() => {
                        // ซ่อน Loading
                        loadingEl.classList.add('hidden');
                        loadingEl.classList.remove('flex');
                    });
            }
        });

        // Modal Logic
        const modal = document.getElementById('eventModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalDate = document.getElementById('modalDate');

        function showModal(title, desc) {
            modalTitle.innerText = title;
            modalDate.innerText = desc;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    </script></body>
</html>
